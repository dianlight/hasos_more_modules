# =============================================================================
# .github/workflows/main_build.yml
#
# Fixed bugs vs previous version:
#   1. Defconfig names corrected (rpi4_defconfig → rpi4_64_defconfig, etc.)
#   2. BR2_EXTERNAL path fixed (was '../ha-build', now abs path to buildroot-external)
#   3. MAX_PENDING_VERSIONS wired through workflow → build_matrix.py
#   4. Corrupted 'head -1)|head-1)' line in QUIC step removed
#   5. linux-build/linux-rebuild now runs on output/Makefile (not haos root)
#   6. LINUX_DIR exported immediately after kernel build, reused everywhere
# =============================================================================

name: Build extra HAOS kernel modules

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:
    inputs:
      haos_version:
        description: "Force a specific HAOS version (leave empty for auto-detect)"
        required: false
        default: ""
      force_rebuild:
        description: "Force rebuild even if assets already exist"
        type: boolean
        required: false
        default: false
      max_pending_versions:
        description: "Max HAOS versions to build per run (0=all, default 1)"
        required: false
        default: "1"
  repository_dispatch:
    types: [build-modules]

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: false

env:
  HAOS_REPO: home-assistant/operating-system
  THIS_REPO: ${{ github.repository }}
  BR_DL_DIR: /tmp/buildroot-dl
  # Resolution order: workflow_dispatch input → repo variable → default 1.
  # Configure via Settings → Variables → New repository variable: MAX_PENDING_VERSIONS
  MAX_PENDING_VERSIONS: ${{ inputs.max_pending_versions || vars.MAX_PENDING_VERSIONS || '1' }}

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: Detect which HAOS versions need new module builds
  # ---------------------------------------------------------------------------
  detect-releases:
    name: Detect missing releases
    runs-on: ubuntu-22.04
    outputs:
      matrix: ${{ steps.build-matrix.outputs.matrix }}
      has_work: ${{ steps.build-matrix.outputs.has_work }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Detect missing HAOS releases
        id: detect
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          EXTRA_ARGS=""
          if [[ -n "${{ inputs.haos_version }}" ]]; then
            EXTRA_ARGS="--force-version ${{ inputs.haos_version }}"
          fi
          if [[ "${{ inputs.force_rebuild }}" == "true" ]]; then
            EXTRA_ARGS="$EXTRA_ARGS --force-rebuild"
          fi
          python3 scripts/check_releases.py \
            --haos-repo "$HAOS_REPO" \
            --this-repo "$THIS_REPO" \
            --output    missing_versions.json \
            $EXTRA_ARGS

      - name: Build CI matrix
        id: build-matrix
        run: |
          echo "MAX_PENDING_VERSIONS=${MAX_PENDING_VERSIONS}"
          MATRIX=$(python3 scripts/build_matrix.py \
            --missing              missing_versions.json \
            --modules              config/modules.json \
            --output               matrix.json \
            --max-pending-versions "${{ env.MAX_PENDING_VERSIONS }}")
          echo "matrix=${MATRIX}" >> "$GITHUB_OUTPUT"
          HAS_WORK=$(python3 -c "
          import json
          d = json.load(open('matrix.json'))
          print('true' if d.get('include') else 'false')
          ")
          echo "has_work=${HAS_WORK}" >> "$GITHUB_OUTPUT"

      - name: Upload matrix artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-matrix
          path: matrix.json

  # ---------------------------------------------------------------------------
  # Job 2: Build modules for each (version, board) combination
  # ---------------------------------------------------------------------------
  build-modules:
    name: "Build ${{ matrix.version }} / ${{ matrix.board }}"
    needs: detect-releases
    if: needs.detect-releases.outputs.has_work == 'true'
    runs-on: ubuntu-22.04

    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.detect-releases.outputs.matrix) }}

    env:
      HAOS_VERSION: ${{ matrix.version }}
      BOARD: ${{ matrix.board }}
      ARCH: ${{ matrix.arch }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # -----------------------------------------------------------------------
      # Cache: Buildroot downloads
      # -----------------------------------------------------------------------
      - name: Restore Buildroot downloads cache
        uses: actions/cache@v4
        with:
          path: ${{ env.BR_DL_DIR }}
          key: br-dl-${{ matrix.version }}-${{ matrix.board }}-${{ hashFiles('config/modules.json') }}
          restore-keys: |
            br-dl-${{ matrix.version }}-${{ matrix.board }}-
            br-dl-${{ matrix.version }}-

      # -----------------------------------------------------------------------
      # Extract source refs (ZFS, QUIC) for cache keys and build steps
      # -----------------------------------------------------------------------
      - name: Extract ZFS and QUIC refs
        id: refs
        run: |
          python3 - << 'PYEOF'
          import json, os
          d = json.load(open('config/modules.json'))
          zfs_ref  = d.get('zfs_build', {}).get('ref', 'zfs-2.2-release')
          quic_mod = next((m for m in d['modules'] if m['name'] == 'quic'), None)
          quic_ref = quic_mod['source']['ref'] if quic_mod and quic_mod.get('source') else 'main'
          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f"zfs_ref={zfs_ref}\n")
              f.write(f"quic_ref={quic_ref}\n")
          print(f"ZFS ref:  {zfs_ref}")
          print(f"QUIC ref: {quic_ref}")
          PYEOF

      - name: Restore ZFS source cache
        if: matrix.has_zfs
        uses: actions/cache@v4
        with:
          path: /tmp/zfs-source
          key: zfs-src-${{ steps.refs.outputs.zfs_ref }}
          restore-keys: zfs-src-

      - name: Restore QUIC source cache
        uses: actions/cache@v4
        with:
          path: /tmp/quic-source
          key: quic-src-${{ steps.refs.outputs.quic_ref }}
          restore-keys: quic-src-

      # -----------------------------------------------------------------------
      # Install build dependencies
      # -----------------------------------------------------------------------
      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            build-essential bc bison flex \
            libssl-dev libelf-dev libncurses-dev \
            cpio rsync wget unzip git python3 \
            gcc-aarch64-linux-gnu binutils-aarch64-linux-gnu \
            gawk file

      # -----------------------------------------------------------------------
      # Checkout HAOS at the target version tag
      # -----------------------------------------------------------------------
      - name: Checkout HAOS ${{ matrix.version }}
        uses: actions/checkout@v4
        with:
          repository: home-assistant/operating-system
          ref: ${{ matrix.version }}
          path: haos
          submodules: recursive
          fetch-depth: 1

      # -----------------------------------------------------------------------
      # Configure Buildroot
      #
      # HAOS layout:
      #   haos/buildroot/                   ← upstream Buildroot source
      #   haos/buildroot-external/          ← HAOS board configs & packages
      #   haos/buildroot-external/configs/  ← defconfig files
      #
      # We call buildroot's make directly (no Docker) with explicit BR2_EXTERNAL.
      # BR2_DL_DIR is set to our cached downloads directory.
      # -----------------------------------------------------------------------
      - name: Configure Buildroot for ${{ matrix.board }}
        working-directory: haos
        run: |
          mkdir -p "$BR_DL_DIR" output

          DEFCONFIG="buildroot-external/configs/${{ matrix.defconfig }}"
          if [[ ! -f "$DEFCONFIG" ]]; then
            echo "::error::Defconfig not found: $DEFCONFIG"
            echo "Available defconfigs in buildroot-external/configs/:"
            ls buildroot-external/configs/ | grep defconfig || echo "(none)"
            exit 1
          fi

          echo "=== Configuring: ${{ matrix.defconfig }} ==="
          make -C buildroot \
            O="$(pwd)/output" \
            BR2_EXTERNAL="$(pwd)/buildroot-external" \
            BR2_DL_DIR="$BR_DL_DIR" \
            "${{ matrix.defconfig }}"

          # HAOS defconfigs hardcode Docker-specific paths:
          #   BR2_DL_DIR="/cache"       → download cache (Docker volume)
          #   BR2_CCACHE_DIR="/cache/cc" → ccache directory (Docker volume)
          # Patch both to writable paths inside our runner workspace.
          OUTPUT_CONFIG="output/.config"
          if [[ -f "$OUTPUT_CONFIG" ]]; then
            echo "Patching Docker paths in $OUTPUT_CONFIG ..."
            sed -i \
              -e "s|^BR2_DL_DIR=.*|BR2_DL_DIR=\"${BR_DL_DIR}\"|" \
              -e "s|^BR2_CCACHE_DIR=.*|BR2_CCACHE_DIR=\"/tmp/br-ccache\"|" \
              "$OUTPUT_CONFIG"
            echo "  BR2_DL_DIR    = $(grep '^BR2_DL_DIR=' "$OUTPUT_CONFIG")"
            echo "  BR2_CCACHE_DIR = $(grep '^BR2_CCACHE_DIR=' "$OUTPUT_CONFIG" || echo '(not set)')"
          fi

          # local.mk overrides — Buildroot reads this file and it has top priority
          # over values in .config. Covers any path that .config might miss.
          mkdir -p /tmp/br-ccache
          cat > output/local.mk << LOCALMK
          BR2_DL_DIR := ${BR_DL_DIR}
          BR2_CCACHE_DIR := /tmp/br-ccache
          LOCALMK
          echo "local.mk written:"
          cat output/local.mk

      # -----------------------------------------------------------------------
      # Build the Linux kernel
      # Always pass BR2_DL_DIR on the command line as belt-and-suspenders
      # -----------------------------------------------------------------------
      - name: Build kernel
        working-directory: haos
        run: |
          echo "=== linux-build ==="
          make -C output \
            BR2_DL_DIR="$BR_DL_DIR" \
            BR2_CCACHE_DIR="/tmp/br-ccache" \
            linux-build 2>&1 | \
            grep -v '^  \(GEN\|UPD\|DEP\|LN\)' | tail -60 || true

          LINUX_DIR=$(find output/build -maxdepth 1 -name 'linux-*' -type d 2>/dev/null | head -1)
          if [[ -z "$LINUX_DIR" ]]; then
            echo "::error::linux build directory not found after linux-build"
            exit 1
          fi
          # Export absolute path — reused by all subsequent steps
          echo "LINUX_DIR=$(pwd)/${LINUX_DIR}" >> "$GITHUB_ENV"
          echo "Kernel dir: $(pwd)/${LINUX_DIR}"

      # -----------------------------------------------------------------------
      # modules_prepare — sets up module build infrastructure for out-of-tree
      # -----------------------------------------------------------------------
      - name: Prepare kernel module build infrastructure
        run: |
          make -C "$LINUX_DIR" \
            ARCH="${{ matrix.kernel_arch }}" \
            CROSS_COMPILE="${{ matrix.cross_compile }}" \
            modules_prepare 2>&1 | tail -5

      # -----------------------------------------------------------------------
      # Patch kernel .config to enable in-tree extra modules
      # -----------------------------------------------------------------------
      - name: Patch kernel config
        run: |
          KCONFIG="${LINUX_DIR}/.config"
          [[ -f "$KCONFIG" ]] || { echo "::error::$KCONFIG not found"; exit 1; }

          KERNEL_CONFIG="$KCONFIG" \
          TARGET_ARCH="${ARCH}" \
          TARGET_BOARD="${BOARD}" \
          REPO_ROOT="$(pwd)" \
          bash scripts/patch_config.sh "$KCONFIG" "${ARCH}" "${BOARD}" \
            > patch_result.json

          python3 -m json.tool patch_result.json

      # -----------------------------------------------------------------------
      # Rebuild kernel with patched config → produces in-tree .ko files
      # -----------------------------------------------------------------------
      - name: Build in-tree kernel modules
        working-directory: haos
        run: |
          make -C output \
            BR2_DL_DIR="$BR_DL_DIR" \
            BR2_CCACHE_DIR="/tmp/br-ccache" \
            linux-rebuild 2>&1 | \
            grep -E '(CC \[M\]|LD \[M\]|MODPOST|Building modules|\.ko:|error:)' || true

      # -----------------------------------------------------------------------
      # Build QUIC module (out-of-tree, GPL-2.0)
      # -----------------------------------------------------------------------
      - name: Build QUIC module
        run: |
          mkdir -p output_modules
          VERBOSE=1 bash scripts/build_quic.sh \
            --linux-dir    "$LINUX_DIR" \
            --linux-obj    "$LINUX_DIR" \
            --output-dir   output_modules \
            --arch         "${ARCH}" \
            --cross-compile "${{ matrix.cross_compile }}" \
            --quic-ref     "${{ steps.refs.outputs.quic_ref }}" \
            --jobs         "$(nproc)" \
            || echo "::warning::QUIC build failed on ${{ matrix.board }} — skipping"

      # -----------------------------------------------------------------------
      # Probe GPL symbols (CDDL/GPL conflict detection for ZFS)
      # -----------------------------------------------------------------------
      - name: Probe GPL symbols for ZFS compatibility
        id: gpl-probe
        if: matrix.has_zfs
        run: |
          ARCH="${ARCH}" VERBOSE=1 \
          bash scripts/probe_gpl_symbols.sh "$LINUX_DIR" "$LINUX_DIR" \
            && echo "safe=true"  >> "$GITHUB_OUTPUT" \
            || {
              CODE=$?
              [[ "$CODE" == "1" ]] && MSG="GPL conflict — ZFS safe mode (no NEON)" \
                                   || MSG="probe inconclusive — ZFS safe mode"
              echo "safe=false" >> "$GITHUB_OUTPUT"
              echo "::warning::${{ matrix.board }}: ${MSG}"
            }
          true   # always continue; build_zfs.sh handles safe mode internally

      # -----------------------------------------------------------------------
      # Build ZFS modules (out-of-tree, CDDL with auto safe-mode)
      # -----------------------------------------------------------------------
      - name: Build ZFS modules
        if: matrix.has_zfs
        run: |
          mkdir -p output_modules
          VERBOSE=1 BOARD="${BOARD}" bash scripts/build_zfs.sh \
            --linux-dir    "$LINUX_DIR" \
            --linux-obj    "$LINUX_DIR" \
            --output-dir   output_modules \
            --arch         "${ARCH}" \
            --cross-compile "${{ matrix.cross_compile }}" \
            --zfs-repo     "https://github.com/openzfs/zfs" \
            --zfs-ref      "${{ steps.refs.outputs.zfs_ref }}" \
            --board        "${BOARD}" \
            --jobs         "$(nproc)"

      # -----------------------------------------------------------------------
      # Collect .ko files
      # -----------------------------------------------------------------------
      - name: Collect built modules
        run: |
          mkdir -p release_assets

          VALID_MODULES=$(python3 -c "
          import json
          print(' '.join(m['name'] for m in json.load(open('config/modules.json'))['modules']))
          ")

          collect_ko() {
            local ko="$1" label="$2" base dest
            base=$(basename "$ko" .ko)
            if echo " $VALID_MODULES " | grep -q " ${base} "; then
              dest="release_assets/${base}_${HAOS_VERSION}_${ARCH}.ko"
              cp -f "$ko" "$dest"
              echo "  [${label}] ${base}.ko"
            fi
          }

          echo "--- In-tree ---"
          while IFS= read -r -d '' ko; do
            collect_ko "$ko" "in-tree"
          done < <(find "${LINUX_DIR}" -name '*.ko' -print0 2>/dev/null)

          echo "--- Out-of-tree (ZFS / QUIC) ---"
          if [[ -d output_modules ]]; then
            for ko in output_modules/*.ko; do
              [[ -f "$ko" ]] && collect_ko "$ko" "out-of-tree"
            done
          fi

          echo "---"
          ls -lh release_assets/*.ko 2>/dev/null || echo "  (no .ko files)"
          echo "Total: $(find release_assets -name '*.ko' | wc -l) module(s)"

      # -----------------------------------------------------------------------
      # Verify vermagic
      # -----------------------------------------------------------------------
      - name: Verify module vermagic
        run: |
          find release_assets -name '*.ko' | grep -q . || {
            echo "::warning::No .ko files to verify"; exit 0
          }
          python3 scripts/verify_modules.py \
            --modules-dir release_assets \
            --linux-dir   "${LINUX_DIR}" \
            --report      "release_assets/verify_report_${HAOS_VERSION}_${BOARD}.json" \
            || echo "::warning::Verify warnings — check verify_report JSON"

      # -----------------------------------------------------------------------
      # Generate build_info JSON
      # -----------------------------------------------------------------------
      - name: Generate build metadata
        run: |
          KVER=$(find "${LINUX_DIR}" -name utsrelease.h 2>/dev/null \
                 | head -1 \
                 | xargs -I{} grep -o 'UTS_RELEASE "[^"]*"' {} \
                 | sed 's/UTS_RELEASE "//;s/"//' \
                 || echo "unknown")

          MODULE_COUNT=$(find release_assets -name '*.ko' | wc -l | tr -d ' ')

          printf '{
            "haos_version": "%s",
            "board": "%s",
            "arch": "%s",
            "kernel_version": "%s",
            "zfs_ref": "%s",
            "zfs_safe_mode": "%s",
            "quic_ref": "%s",
            "module_count": %s,
            "built_at": "%s",
            "workflow_run": "%s"
          }\n' \
            "${HAOS_VERSION}" "${BOARD}" "${ARCH}" "${KVER}" \
            "${{ steps.refs.outputs.zfs_ref }}" \
            "${{ steps.gpl-probe.outputs.safe || 'n/a' }}" \
            "${{ steps.refs.outputs.quic_ref }}" \
            "${MODULE_COUNT}" \
            "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            "${{ github.run_id }}" \
            > "release_assets/build_info_${HAOS_VERSION}_${BOARD}.json"

          python3 -c "
          import json
          json.load(open('release_assets/build_info_${HAOS_VERSION}_${BOARD}.json'))
          print('build_info JSON valid ✓')
          "

      # -----------------------------------------------------------------------
      # Upload to GitHub Release
      # -----------------------------------------------------------------------
      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ matrix.version }}
          name: "HAOS ${{ matrix.version }} kernel modules"
          files: release_assets/*
          body: |
            Extra kernel modules for **Home Assistant OS ${{ matrix.version }}**.

            See [README](https://github.com/${{ github.repository }}#readme) for install instructions.

            > ⚠️ ZFS on RPi/Yellow is built in **safe mode** when `kernel_neon_begin`
            > is `EXPORT_SYMBOL_GPL`. Check `build_info_*.json` → `zfs_safe_mode`.
          make_latest: "legacy"
          token: ${{ secrets.GITHUB_TOKEN }}

  # ---------------------------------------------------------------------------
  # Job 3: Build Summary
  # ---------------------------------------------------------------------------
  summary:
    name: Build Summary
    needs: [detect-releases, build-modules]
    if: always()
    runs-on: ubuntu-22.04

    steps:
      - name: Download matrix artifact
        uses: actions/download-artifact@v4
        with:
          name: build-matrix
          path: .
        continue-on-error: true

      - name: Print summary
        run: |
          echo "## Build Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [[ "${{ needs.detect-releases.outputs.has_work }}" == "false" ]]; then
            echo "✅ No new HAOS releases — all modules up to date." >> "$GITHUB_STEP_SUMMARY"
          elif [[ -f matrix.json ]]; then
            echo "| Version | Board | Result |" >> "$GITHUB_STEP_SUMMARY"
            echo "|---------|-------|--------|" >> "$GITHUB_STEP_SUMMARY"
            python3 -c "
          import json
          for item in json.load(open('matrix.json')).get('include', []):
              print(f\"| {item.get('version','?')} | {item.get('board','?')} | ${{ needs.build-modules.result }} |\")
          " >> "$GITHUB_STEP_SUMMARY" 2>/dev/null || true
          fi
