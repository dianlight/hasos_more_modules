# =============================================================================
# .github/workflows/main_build.yml
#
# Main CI/CD workflow for hasos_more_modules.
#
# Optimizations vs previous version:
#   1. Buildroot download + build cache: skips re-downloading toolchain/sources
#      on every run (saves 10-30 min per board per run).
#   2. ZFS GPL symbol probe: auto-detects kernel_neon_begin EXPORT_SYMBOL_GPL
#      status at build time. Enables ZFS on RPi/Yellow if safe; skips if not.
#   3. Module artifact cache: avoids rebuilding unchanged modules.
#   4. Per-board parallelism: each (version, board) is a separate job.
#   5. Concurrency group: prevents duplicate runs for the same version.
# =============================================================================

name: Build extra HAOS kernel modules

on:
  schedule:
    - cron: "0 6 * * *"      # Daily at 06:00 UTC
  workflow_dispatch:
    inputs:
      haos_version:
        description: "Force a specific HAOS version (leave empty for auto-detect)"
        required: false
        default: ""
      force_rebuild:
        description: "Force rebuild even if assets already exist"
        type: boolean
        required: false
        default: false
  repository_dispatch:
    types: [build-modules]

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: false   # Don't cancel: builds are long and idempotent

# ---------------------------------------------------------------------------
# Global environment
# ---------------------------------------------------------------------------
env:
  HAOS_REPO:       home-assistant/operating-system
  THIS_REPO:       ${{ github.repository }}
  BUILDROOT_CACHE: buildroot-cache
  ZFS_CACHE:       zfs-source-cache
  # Buildroot output is large; cache only the dl/ (downloads) directory.
  # The build/ directory is too large (~8GB) and changes every kernel bump.
  BR_DL_DIR:       /tmp/buildroot-dl

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: Detect which HAOS versions need new module builds
  # ---------------------------------------------------------------------------
  detect-releases:
    name: Detect missing releases
    runs-on: ubuntu-22.04
    outputs:
      matrix: ${{ steps.build-matrix.outputs.matrix }}
      has_work: ${{ steps.build-matrix.outputs.has_work }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Detect missing HAOS releases
        id: detect
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [[ -n "${{ github.event.inputs.haos_version }}" ]]; then
            echo "FORCE_VERSION=${{ github.event.inputs.haos_version }}" >> "$GITHUB_ENV"
          fi
          python3 scripts/check_releases.py \
            --haos-repo "$HAOS_REPO" \
            --this-repo "$THIS_REPO" \
            --output missing_versions.json \
            ${FORCE_VERSION:+--force-version "$FORCE_VERSION"} \
            ${{ github.event.inputs.force_rebuild == 'true' && '--force-rebuild' || '' }}

      - name: Build CI matrix
        id: build-matrix
        run: |
          # build_matrix.py writes pretty JSON to --output file
          # and prints compact JSON to stdout for direct capture.
          MATRIX=$(python3 scripts/build_matrix.py \
            --missing missing_versions.json \
            --modules config/modules.json \
            --output  matrix.json)
          echo "matrix=${MATRIX}" >> "$GITHUB_OUTPUT"
          HAS_WORK=$(python3 -c "import json; d=json.load(open('matrix.json')); print('true' if d.get('include') else 'false')")
          echo "has_work=$HAS_WORK" >> "$GITHUB_OUTPUT"

      - name: Upload matrix artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-matrix
          path: matrix.json

  # ---------------------------------------------------------------------------
  # Job 2: Build modules for each (version, board) combination
  # ---------------------------------------------------------------------------
  build-modules:
    name: "Build ${{ matrix.version }} / ${{ matrix.board }}"
    needs: detect-releases
    if: needs.detect-releases.outputs.has_work == 'true'
    runs-on: ${{ matrix.board == 'x86_64' && 'ubuntu-22.04' || 'ubuntu-22.04' }}

    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.detect-releases.outputs.matrix) }}

    env:
      HAOS_VERSION:  ${{ matrix.version }}
      BOARD:         ${{ matrix.board }}
      ARCH:          ${{ matrix.arch }}
      BR_ARCH:       ${{ matrix.buildroot_arch }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # -----------------------------------------------------------------------
      # Cache: Buildroot downloads directory
      # Key includes HAOS version (new version = new kernel = new downloads).
      # -----------------------------------------------------------------------
      - name: Restore Buildroot downloads cache
        id: cache-br-dl
        uses: actions/cache@v4
        with:
          path: ${{ env.BR_DL_DIR }}
          key: br-dl-${{ matrix.version }}-${{ matrix.board }}-${{ hashFiles('config/modules.json') }}
          restore-keys: |
            br-dl-${{ matrix.version }}-${{ matrix.board }}-
            br-dl-${{ matrix.version }}-

      # -----------------------------------------------------------------------
      # Cache: ZFS source tree (keyed on ZFS ref from modules.json)
      # -----------------------------------------------------------------------
      - name: Extract ZFS ref from modules.json
        id: zfs-ref
        run: |
          ZFS_REF=$(python3 -c "
          import json
          d = json.load(open('config/modules.json'))
          print(d.get('zfs_build', {}).get('ref', 'zfs-2.2-release'))
          ")
          echo "ref=$ZFS_REF" >> "$GITHUB_OUTPUT"

      - name: Restore ZFS source cache
        id: cache-zfs
        if: matrix.has_zfs
        uses: actions/cache@v4
        with:
          path: /tmp/zfs-source
          key: zfs-src-${{ steps.zfs-ref.outputs.ref }}
          restore-keys: |
            zfs-src-${{ steps.zfs-ref.outputs.ref }}

      # -----------------------------------------------------------------------
      # Install build dependencies
      # -----------------------------------------------------------------------
      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            build-essential bc bison flex libssl-dev libelf-dev \
            libncurses-dev cpio rsync wget unzip git python3 \
            gcc-aarch64-linux-gnu binutils-aarch64-linux-gnu \
            gawk file

      # -----------------------------------------------------------------------
      # Checkout HAOS operating-system repo at the target version tag
      # -----------------------------------------------------------------------
      - name: Checkout HAOS operating-system
        uses: actions/checkout@v4
        with:
          repository: home-assistant/operating-system
          ref: ${{ matrix.version }}
          path: haos
          submodules: recursive
          fetch-depth: 1

      # -----------------------------------------------------------------------
      # Configure Buildroot
      # -----------------------------------------------------------------------
      - name: Configure Buildroot for ${{ matrix.board }}
        working-directory: haos
        run: |
          # Set Buildroot download cache directory
          mkdir -p "$BR_DL_DIR"
          echo "BR2_DL_DIR=\"${BR_DL_DIR}\"" >> buildroot/.config 2>/dev/null || true

          # Configure for target board
          make BR2_EXTERNAL=../ha-build O=output \
            "${{ matrix.defconfig }}"

      # -----------------------------------------------------------------------
      # Build kernel (headers + modules only — not full system image)
      # -----------------------------------------------------------------------
      - name: Build kernel headers + module support files
        working-directory: haos
        run: |
          # We only need:
          #   - scripts/   (module build infrastructure)
          #   - include/   (kernel headers)
          #   - Module.symvers (for GPL symbol probe)
          # Use linux-rebuild to build only the kernel, not rootfs/bootloader.
          make -C output linux-rebuild 2>&1 | tail -50 || true
          # Alternatively (faster): build only what's needed for external modules
          make -C output/build/linux-* \
            ARCH="${{ matrix.kernel_arch }}" \
            CROSS_COMPILE="${{ matrix.cross_compile }}" \
            modules_prepare 2>&1 | tail -20 || true

      # -----------------------------------------------------------------------
      # Patch kernel config to enable in-tree extra modules (xfs, nfs, etc.)
      # -----------------------------------------------------------------------
      - name: Patch kernel config
        run: |
          # Find the kernel config used for this board
          KCONFIG=$(find haos/output/build/linux-* -name .config -maxdepth 1 | head -1)
          if [[ -z "$KCONFIG" ]]; then
            echo "::error::Could not find kernel .config"
            exit 1
          fi
          echo "Patching: $KCONFIG"
          KERNEL_CONFIG="$KCONFIG" \
          TARGET_ARCH="${ARCH}" \
          TARGET_BOARD="${BOARD}" \
          REPO_ROOT="$(pwd)" \
          bash scripts/patch_config.sh "$KCONFIG" "${ARCH}" "${BOARD}" \
            > patch_result.json

          echo "Patch result:"
          cat patch_result.json

      # -----------------------------------------------------------------------
      # Build in-tree modules (xfs, nfs, nfsd, quic, ...)
      # -----------------------------------------------------------------------
      - name: Build in-tree kernel modules
        working-directory: haos
        run: |
          make -C output linux-rebuild 2>&1 | grep -E '(Building|CC \[M\]|LD \[M\]|MODPOST|\.ko)' || true

      # -----------------------------------------------------------------------
      # Build QUIC out-of-tree module (GPL-2.0 — no license conflicts)
      # -----------------------------------------------------------------------
      - name: Extract QUIC ref from modules.json
        id: quic-ref
        run: |
          QUIC_REF=$(python3 -c "
          import json
          d = json.load(open('config/modules.json'))
          for m in d['modules']:
              if m['name'] == 'quic' and m.get('source'):
                  print(m['source'].get('ref', 'main'))
                  break
          else:
              print('main')
          ")
          echo "ref=$QUIC_REF" >> "$GITHUB_OUTPUT"

      - name: Restore QUIC source cache
        uses: actions/cache@v4
        with:
          path: /tmp/quic-source
          key: quic-src-${{ steps.quic-ref.outputs.ref }}
          restore-keys: quic-src-

      - name: Build QUIC module
        run: |
          LINUX_DIR=$(find haos/output/build/linux-* -maxdepth 0 -type d | head -1)
          mkdir -p output_modules

          VERBOSE=1 \
          bash scripts/build_quic.sh \
            --linux-dir    "$LINUX_DIR" \
            --linux-obj    "$LINUX_DIR" \
            --output-dir   output_modules \
            --arch         "${ARCH}" \
            --cross-compile "${{ matrix.cross_compile }}" \
            --quic-ref     "${{ steps.quic-ref.outputs.ref }}" \
            --jobs         "$(nproc)" || \
            echo "::warning::QUIC module build failed on board ${{ matrix.board }} — continuing without it"

      # -----------------------------------------------------------------------
      # Probe GPL symbols (for ZFS / CDDL modules)
      # -----------------------------------------------------------------------
      - name: Probe GPL symbols for ZFS compatibility
        id: gpl-probe
        if: matrix.has_zfs
        run: |
          LINUX_DIR=$(find haos/output/build/linux-* -maxdepth 0 -type d | head -1)
          ARCH="${ARCH}" \
          VERBOSE=1 \
          bash scripts/probe_gpl_symbols.sh "$LINUX_DIR" "$LINUX_DIR" \
            && echo "safe=true" >> "$GITHUB_OUTPUT" \
            || {
              CODE=$?
              if [[ "$CODE" == "1" ]]; then
                echo "safe=false" >> "$GITHUB_OUTPUT"
                echo "::warning::Board ${{ matrix.board }}: GPL symbol conflict detected. ZFS modules will be built in safe mode (no NEON)."
              else
                echo "safe=unknown" >> "$GITHUB_OUTPUT"
                echo "::warning::Board ${{ matrix.board }}: GPL probe inconclusive. Proceeding with safe mode."
              fi
            }
          # Always continue — safe mode is handled inside build_zfs.sh
          true

      # -----------------------------------------------------------------------
      # Build ZFS out-of-tree modules
      # -----------------------------------------------------------------------
      - name: Build ZFS modules
        if: matrix.has_zfs
        run: |
          LINUX_DIR=$(find haos/output/build/linux-* -maxdepth 0 -type d | head -1)
          ZFS_REF="${{ steps.zfs-ref.outputs.ref }}"

          mkdir -p output_modules

          VERBOSE=1 \
          BOARD="${BOARD}" \
          bash scripts/build_zfs.sh \
            --linux-dir    "$LINUX_DIR" \
            --linux-obj    "$LINUX_DIR" \
            --output-dir   output_modules \
            --arch         "${ARCH}" \
            --cross-compile "${{ matrix.cross_compile }}" \
            --zfs-repo     "https://github.com/openzfs/zfs" \
            --zfs-ref      "$ZFS_REF" \
            --board        "${BOARD}" \
            --jobs         "$(nproc)"

      # -----------------------------------------------------------------------
      # Collect all .ko files
      # -----------------------------------------------------------------------
      - name: Collect built modules
        run: |
          mkdir -p release_assets

          # Read the canonical module names from modules.json once
          VALID_MODULES=$(python3 -c "
          import json
          d = json.load(open('config/modules.json'))
          print(' '.join(m['name'] for m in d['modules']))
          ")

          collect_ko() {
            local ko="$1" label="$2"
            local base dest
            base=$(basename "$ko" .ko)
            # Only collect modules explicitly listed in modules.json
            if echo " $VALID_MODULES " | grep -q " ${base} "; then
              dest="release_assets/${base}_${HAOS_VERSION}_${ARCH}.ko"
              cp -f "$ko" "$dest"
              echo "  [${label}] ${base}.ko -> ${dest}"
            fi
          }

          echo "--- Collecting in-tree modules ---"
          while IFS= read -r -d '' ko; do
            collect_ko "$ko" "in-tree"
          done < <(find haos/output/build/linux-* -name '*.ko' -print0 2>/dev/null)

          echo "--- Collecting out-of-tree modules (ZFS, QUIC) ---"
          if [[ -d output_modules ]]; then
            for ko in output_modules/*.ko; do
              [[ -f "$ko" ]] || continue
              collect_ko "$ko" "out-of-tree"
            done
          fi

          echo "---"
          echo "Release assets (${HAOS_VERSION} / ${BOARD}):"
          ls -lh release_assets/*.ko 2>/dev/null || echo "  (no .ko files)"
          echo "Total: $(find release_assets -name '*.ko' | wc -l) module(s)"

      # -----------------------------------------------------------------------
      # Verify built modules (vermagic check)
      # -----------------------------------------------------------------------
      - name: Verify module vermagic
        run: |
          if ! find release_assets -name '*.ko' | grep -q .; then
            echo "::warning::No .ko files found to verify"
            exit 0
          fi
          python3 scripts/verify_modules.py \
            --modules-dir release_assets \
            --linux-dir "$(find haos/output/build/linux-* -maxdepth 0 -type d | head -1)" \
            --report release_assets/verify_report_${HAOS_VERSION}_${BOARD}.json || {
              echo "::warning::Module verification produced warnings — check verify_report JSON"
            }

      # -----------------------------------------------------------------------
      # Generate build metadata (vermagic, board, version, safe_mode)
      # -----------------------------------------------------------------------
      - name: Generate build metadata
        run: |
          # Extract kernel version from utsrelease.h (portable grep, no -P)
          KVER=$(find haos/output/build/linux-* -name utsrelease.h 2>/dev/null \
                 | head -1 \
                 | xargs -I{} grep -o 'UTS_RELEASE "[^"]*"' {} \
                 | sed 's/UTS_RELEASE "//;s/"//' \
                 || echo "unknown")

          # Count modules built
          MODULE_COUNT=$(find release_assets -name '*.ko' | wc -l | tr -d ' ')

          # Write JSON with printf to avoid heredoc indentation issues
          printf '{
  "haos_version": "%s",
  "board": "%s",
  "arch": "%s",
  "kernel_version": "%s",
  "zfs_ref": "%s",
  "zfs_safe_mode": "%s",
  "quic_ref": "%s",
  "module_count": %s,
  "built_at": "%s",
  "workflow_run": "%s"
}\n' \
            "${HAOS_VERSION}" \
            "${BOARD}" \
            "${ARCH}" \
            "${KVER}" \
            "${{ steps.zfs-ref.outputs.ref || 'n/a' }}" \
            "${{ steps.gpl-probe.outputs.safe || 'n/a' }}" \
            "${{ steps.quic-ref.outputs.ref || 'n/a' }}" \
            "${MODULE_COUNT}" \
            "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            "${{ github.run_id }}" \
          > release_assets/build_info_${HAOS_VERSION}_${BOARD}.json

          echo "Build metadata:"
          cat release_assets/build_info_${HAOS_VERSION}_${BOARD}.json
          # Validate JSON
          python3 -c "import json,sys; json.load(open('release_assets/build_info_${HAOS_VERSION}_${BOARD}.json')); print('JSON valid ✓')"

      # -----------------------------------------------------------------------
      # Upload assets as GitHub Release
      # -----------------------------------------------------------------------
      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ matrix.version }}
          name: "HAOS ${{ matrix.version }} kernel modules"
          files: release_assets/*
          body: |
            Extra kernel modules for **Home Assistant OS ${{ matrix.version }}**.

            Built automatically from [hasos_more_modules](https://github.com/${{ github.repository }}).

            See the [README](https://github.com/${{ github.repository }}#readme) for installation instructions.

            > ⚠️ ZFS modules on RPi/Yellow boards are built in **safe mode** (no NEON acceleration)
            > when `kernel_neon_begin` is detected as `EXPORT_SYMBOL_GPL` on that kernel.
            > The build metadata JSON in the release assets records `zfs_safe_mode: true/false`.
          make_latest: "legacy"
          token: ${{ secrets.GITHUB_TOKEN }}

  # ---------------------------------------------------------------------------
  # Job 3: Notify / summary
  # ---------------------------------------------------------------------------
  summary:
    name: Build Summary
    needs: [detect-releases, build-modules]
    if: always()
    runs-on: ubuntu-22.04

    steps:
      - name: Download matrix artifact
        uses: actions/download-artifact@v4
        with:
          name: build-matrix
          path: .

      - name: Print summary
        run: |
          echo "## Build Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [[ "${{ needs.detect-releases.outputs.has_work }}" == "false" ]]; then
            echo "✅ No new HAOS releases detected — all modules are up to date." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "| Board | Version | Status |" >> "$GITHUB_STEP_SUMMARY"
            echo "|-------|---------|--------|" >> "$GITHUB_STEP_SUMMARY"
            python3 - <<'EOF'
          import json, os
          matrix = json.load(open('matrix.json'))
          for item in matrix.get('include', []):
              board   = item.get('board', '?')
              version = item.get('version', '?')
              print(f"| {board} | {version} | ⏳ built |")
          EOF
          fi
